<!DOCTYPE html>
<html>

<head>
    <title>환세취호전 웹 에뮬레이터</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="DOS Emulator, DOS JavaScript Emulator, WebAssembly, HTML5">
    <meta charset="UTF-8">
    <script src="./vendor/jquery.min.js"></script>
    <script src="./vendor/rivets.min.js"></script>
    <link rel="stylesheet" href="./vendor/bootstrap/bootstrap.min.css">
    <script src="./vendor/popper.min.js"></script>
    <script src="./vendor/bootstrap/bootstrap.min.js"></script>
    <script src="./vendor/toastr/toastr.min.js"></script>
    <link rel="stylesheet" href="./vendor/toastr/toastr.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./vendor/FileSaver.min.js"></script>
    <script src="./vendor/nipplejs.min.js"></script>
    <script src="./vendor/jszip.min.js"></script>
</head>

<body>
    <div id="maindiv" class="container text-center">
        <div id="topPanel" style="display: none;">

            <!-- BEFORE LOAD -->
            <div rv-if="data.beforeEmulatorStarted">

                <div class="mt-2 mb-2" rv-if="data.message">
                    <div rv-html="data.message">
                    </div>
                </div>
                <div class="mt-2 mb-2" rv-if="data.loading">
                    <div class="spinner"></div>
                    Loading...
                </div>


                <div class="emu-progress" id="progressOuter" rv-if="data.showProgress">
                    <div class="emu-progress-bar" id="myProgress"></div>
                </div>

                <button class="ExecRom emu-btn emu-btn-primary mt-4" onclick="myApp.playGame()"
                    rv-disabled="data.moduleInitializing">게임 시작</button>
            </div>

            <!-- AFTER LOAD -->
            <div class="hover-zone">
                <div rv-hide="data.beforeEmulatorStarted" id="afterLoadDiv">

                    <div class="mt-2 mb-2" rv-if="data.message">
                        <div rv-html="data.message" style="color: white; text-align: center;">
                        </div>
                    </div>

                    <!-- Top Row: Core Tools -->
                    <div
                        style="display: flex; justify-content: center; gap: 10px; border-bottom: 2px dashed #444; padding-bottom: 12px;">
                        <button class="emu-btn" onclick="myApp.togglePause()">일시 정지 / 재개</button>
                        <button class="emu-btn" onclick="myApp.toggleOnscreenKeyboard()">가상 키보드</button>
                    </div>

                    <!-- Bottom Row: Display Mode -->
                    <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">

                        <div class="emu-toggle-wrapper" onclick="myApp.toggleDisplayMode()">
                            <span class="emu-toggle-label" id="labelOriginal">원본 크기</span>
                            <div class="emu-toggle" id="displayToggle">
                                <div class="emu-toggle-knob"></div>
                            </div>
                            <span class="emu-toggle-label" id="labelFit">화면 맞춤</span>
                        </div>

                        <div class="emu-btn-group" role="group">
                            <button class="emu-btn" onclick="myApp.setDisplayMode('fullscreen')">전체 화면</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div style="display: none;" id="errorOuter">
            <div rv-if="data.lblError" class="alert alert-danger mt-4" id="lblError" role="alert"
                rv-html="data.lblError">
            </div>
        </div>
    </div>

    <div id="canvasDiv">
        <!-- ID has to be canvas it's hardcoded in the EM generated .js -->
        <canvas id="canvas" style="width:100%; height: 100%;"></canvas>
    </div>

    <h6 id="githubDiv" class="githubDiv card-title mt-4 text-center" style="display: none;">
        <a href="https://github.com/nbarkhina/doswasmx" target="_blank" style="color: white;">DOSWasmX</a> by Neil
        Barkhina
    </h6>


    <script type="text/javascript">
        function loadJavaScriptRandom(filename) {
            const rando = Math.random().toString(16).slice(2, 17);
            const script = document.createElement('script');
            script.src = `${filename}?${rando}`;
            script.type = 'text/javascript';
            script.async = false;
            document.head.appendChild(script);
        }

        loadJavaScriptRandom('keyboard.js');
        loadJavaScriptRandom('script.js');
        loadJavaScriptRandom('controls.js');
        loadJavaScriptRandom('dosbox.js');
        loadJavaScriptRandom('fat16.js');
    </script>
</body>

</html>
